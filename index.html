<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>創作ネタ app</title>

<!-- PWA / "add to home screen" support -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png?v=1" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=1" />
<meta name="theme-color" content="#45A5FA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ネタ帳" />
<!--
  Cache note: the "?v=1" query on the icon links is a cache-buster for browsers
  in general, but iOS Safari specifically caches the apple-touch-icon by
  FILENAME and largely ignores query strings for it. If you update icon-180.png
  later and iOS still shows the old icon after "追加" from the home screen,
  rename the file itself (e.g. icon-180-v2.png) and update the href here —
  that's the only fully reliable way to bust the icon cache on iOS.
-->

<!-- Tailwind CSS (CDN / JIT, watches the DOM for class names) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Babel (in-browser JSX transform only; ES module import/export is left untouched
     and resolved natively by the browser via the import map below) -->
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<!-- Import map: bare specifiers -> ESM CDN builds -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.294.0?deps=react@18.3.1"
  }
}
</script>

<style>
  html, body, #root { height: 100%; margin: 0; }
  body { overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useRef, useEffect, useMemo } from "react";
import ReactDOM from "react-dom/client";
import { Search, Plus, ChevronLeft, Pencil, Check, X, Trash2 } from "lucide-react";

/**
 * 創作ネタ app
 * Full-viewport mobile web app (no mocked phone frame / status bar).
 * Text entry relies entirely on the device's real keyboard (no on-screen
 * keyboard UI). All idea/project data persists to localStorage.
 */

// ---------------- persistence ----------------
const STORAGE_KEY = "sousaku-neta-app-v1";

const seedIdeas = [
  { id: "i1", title: "アイディア", body: "詳細\nあ\nい\nう\nえ\nお", updatedAt: "7月10日" },
  {
    id: "i2",
    title: "言葉あそびメモ",
    body:
      "こ詳細\nあ\nい\nう\nえ\nお\n\nk\nbunny\nrabbit\nstrawberry\nケンタ新作たのしみ\nもふぞう\nもやしなむる\nあ\nころころ\n日ハム\nバナナマン日村さんいないの寂しい早く復活しますように\nグレーのもふもふかわいい\nえおかきくけこよ今日もありがとうさわげかいじゅうの",
    updatedAt: "7月12日",
  },
  { id: "i3", title: "配信タイトル案", body: "今日もありがとう回\n視聴者参加型ゲーム大会", updatedAt: "7月13日" },
  { id: "i4", title: "オチのアイディア", body: "", updatedAt: "7月14日" },
];

function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.ideas)) return null;
    return parsed;
  } catch (e) {
    return null;
  }
}

// ---------------- small pieces ----------------

function GlassIconButton({ children, onClick, label, tone = "light", size = 44 }) {
  return (
    <button
      onClick={onClick}
      aria-label={label}
      style={
        tone === "solid"
          ? { width: size, height: size }
          : {
              width: size,
              height: size,
              backgroundColor: "rgba(255,255,255,0.10)",
              border: "1px solid rgba(255,255,255,0.40)",
              boxShadow: "inset 2px 1px 6px 0 rgba(255,255,255,0.4)",
            }
      }
      className={
        "flex shrink-0 items-center justify-center rounded-full transition-all duration-150 hover:-translate-y-0.5 active:scale-90 " +
        (tone === "solid"
          ? "border border-white/40 bg-white text-[#19414C] shadow-[0_4px_14px_rgba(0,0,0,0.25)] hover:bg-white/90 hover:shadow-[0_6px_18px_rgba(0,0,0,0.3)]"
          : "text-[#19414C] backdrop-blur-xl hover:bg-white/[0.16]")
      }
    >
      {children}
    </button>
  );
}

function IdeaGlassCard({ idea, onOpen }) {
  const preview = idea.body.split("\n").find((l) => l.trim()) || "詳細";
  return (
    <button
      onClick={onOpen}
      style={{
        width: 155,
        height: 155,
        borderRadius: 20,
        overflow: "hidden",
        backgroundColor: "rgba(255,255,255,0.10)",
        border: "1px solid rgba(255,255,255,0.40)",
        boxShadow: "inset 2px 1px 6px 0 rgba(255,255,255,0.4)",
      }}
      className="group flex shrink-0 flex-col p-3.5 text-left text-[#19414C] backdrop-blur-xl transition-all duration-200 hover:-translate-y-1 hover:bg-white/[0.16] active:scale-[0.97]"
    >
      <p className="line-clamp-2 text-[17px] font-bold leading-snug">{idea.title || "アイディア"}</p>
      <p className="mt-1 line-clamp-5 flex-1 text-[13.5px] leading-relaxed text-[#19414C]/70">{preview}</p>
      {idea.updatedAt && <span className="mt-2 text-[10px] font-medium text-[#19414C]/50">{idea.updatedAt}</span>}
    </button>
  );
}

// ---------------- screens ----------------

function ListScreen({ ideas, projectName, onProjectNameChange, onOpenIdea, onNewIdea, onGoSearch }) {
  const [draftName, setDraftName] = useState(projectName);
  const [editingProject, setEditingProject] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (editingProject) {
      const el = inputRef.current;
      el?.focus();
      const end = el?.value.length ?? 0;
      el?.setSelectionRange(end, end);
    }
  }, [editingProject]);

  function finishEditing() {
    onProjectNameChange(draftName.trim() || "プロジェクト");
    setEditingProject(false);
  }

  return (
    <div className="relative flex min-h-screen w-full flex-col">
      <div
        style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 12,
          paddingLeft: 20,
          paddingRight: 20,
          paddingBottom: 16,
          paddingTop: "calc(env(safe-area-inset-top, 0px) + 16px)",
        }}
      >
        <GlassIconButton onClick={onGoSearch} label="検索" size={52}>
          <Search size={20} />
        </GlassIconButton>

        <div
          role="button"
          tabIndex={0}
          onClick={() => {
            if (editingProject) return;
            setDraftName(projectName === "プロジェクト" ? "" : projectName);
            setEditingProject(true);
          }}
          style={{
            flex: "1 1 auto",
            minWidth: 0,
            maxWidth: 271,
            height: 67,
            borderRadius: 60,
            backgroundColor: "rgba(255,255,255,0.10)",
            border: "1px solid rgba(255,255,255,0.40)",
            boxShadow: "inset 2px 1px 6px 0 rgba(255,255,255,0.4)",
          }}
          className="flex items-center px-5 text-left text-[#19414C] backdrop-blur-xl transition hover:-translate-y-0.5 hover:bg-white/[0.16] active:scale-[0.98]"
        >
          {editingProject ? (
            <input
              ref={inputRef}
              value={draftName}
              onChange={(e) => setDraftName(e.target.value)}
              onClick={(e) => e.stopPropagation()}
              onBlur={finishEditing}
              className="w-full bg-transparent text-[16px] font-bold text-[#19414C] focus:outline-none"
            />
          ) : projectName && projectName !== "プロジェクト" ? (
            <span className="truncate text-[16px] font-bold">{projectName}</span>
          ) : (
            <span className="flex items-center text-[16px] font-bold" style={{ color: "#D9F3FF" }}>
              <span className="cursor-blink mr-1 inline-block h-[18px] w-[2px]" style={{ backgroundColor: "#19414C" }} />
              プロジェクト
            </span>
          )}
        </div>

        <GlassIconButton onClick={onNewIdea} label="新規追加" tone="solid" size={52}>
          <Plus size={22} strokeWidth={2.5} />
        </GlassIconButton>
      </div>

      <div className="flex-1 px-4 pb-10 pt-2">
        <div
          style={{ display: "grid", gridTemplateColumns: "155px 155px", justifyContent: "center", columnGap: 24, rowGap: 20 }}
        >
          {ideas.map((idea) => (
            <IdeaGlassCard key={idea.id} idea={idea} onOpen={() => onOpenIdea(idea.id)} />
          ))}
        </div>
      </div>
    </div>
  );
}

function DetailScreen({ idea, onBack, onEdit, onDelete }) {
  const [confirming, setConfirming] = useState(false);

  return (
    <div className="flex min-h-screen w-full flex-col">
      <div
        className="flex items-center justify-between px-3 pb-2"
        style={{ paddingTop: "calc(env(safe-area-inset-top, 0px) + 12px)" }}
      >
        <GlassIconButton onClick={onBack} label="戻る">
          <ChevronLeft size={20} />
        </GlassIconButton>
        <GlassIconButton onClick={onEdit} label="編集">
          <Pencil size={17} />
        </GlassIconButton>
      </div>

      <div className="relative mx-auto mt-2" style={{ width: 334, height: 717 }}>
        <div
          style={{
            width: 334,
            height: 717,
            borderRadius: 20,
            overflowY: "auto",
            overflowX: "hidden",
            backgroundColor: "rgba(255,255,255,0.10)",
            border: "1px solid rgba(255,255,255,0.40)",
            boxShadow: "inset 2px 1px 6px 0 rgba(255,255,255,0.4)",
          }}
          className="icy-scroll flex flex-col p-5 pb-16 text-left text-[#19414C] backdrop-blur-xl"
        >
          <h1 className="mb-3 text-center text-[28px] font-bold">{idea.title || "アイディア"}</h1>
          <p className="flex-1 whitespace-pre-wrap text-[14.5px] leading-relaxed text-[#19414C]/85">
            {idea.body || "詳細"}
          </p>
        </div>

        <div className="absolute inset-x-0 bottom-4 flex justify-center">
          {confirming ? (
            <div
              onClick={(e) => e.stopPropagation()}
              className="flex items-center gap-3 rounded-full border border-white/40 bg-white/25 px-4 py-2 backdrop-blur-md"
            >
              <span className="text-[13px] font-bold text-[#19414C]">削除しますか？</span>
              <button
                onClick={() => {
                  setConfirming(false);
                  onDelete();
                }}
                className="rounded-full bg-[#e35b5b] px-3 py-1 text-[12px] font-bold text-white transition-all hover:-translate-y-0.5 active:scale-95"
              >
                はい
              </button>
              <button
                onClick={() => setConfirming(false)}
                className="rounded-full border border-white/50 px-3 py-1 text-[12px] font-bold text-[#19414C] transition-all hover:-translate-y-0.5 active:scale-95"
              >
                いいえ
              </button>
            </div>
          ) : (
            <button
              onClick={() => setConfirming(true)}
              className="flex items-center gap-1.5 rounded-full border border-white/40 bg-white/20 px-5 py-2 text-[13px] font-bold text-[#19414C] backdrop-blur-md transition-all hover:-translate-y-0.5 hover:bg-white/35 active:scale-95"
            >
              <Trash2 size={15} />
              このアイディアを削除
            </button>
          )}
        </div>
      </div>
      <div style={{ height: "calc(env(safe-area-inset-bottom, 0px) + 24px)" }} />
    </div>
  );
}

function EditScreen({ idea, isNew, onCancel, onSave }) {
  const [title, setTitle] = useState(idea.title);
  const [body, setBody] = useState(idea.body);
  const titleRef = useRef(null);
  const bodyRef = useRef(null);

  useEffect(() => {
    const target = isNew ? titleRef.current : bodyRef.current;
    if (target) {
      target.focus();
      const end = target.value.length;
      target.setSelectionRange(end, end);
    }
  }, [isNew]);

  return (
    <div className="relative flex min-h-screen w-full flex-col">
      <div
        className="flex items-center justify-between px-3 pb-2"
        style={{ paddingTop: "calc(env(safe-area-inset-top, 0px) + 12px)" }}
      >
        <GlassIconButton onClick={onCancel} label="戻る">
          <ChevronLeft size={20} />
        </GlassIconButton>
        <GlassIconButton onClick={() => onSave({ ...idea, title, body })} label="保存" tone="solid">
          <Check size={19} strokeWidth={2.5} />
        </GlassIconButton>
      </div>

      <div
        style={{
          width: 334,
          height: 717,
          borderRadius: 20,
          overflow: "hidden",
          backgroundColor: "rgba(255,255,255,0.10)",
          border: "1px solid rgba(255,255,255,0.40)",
          boxShadow: "inset 2px 1px 6px 0 rgba(255,255,255,0.4)",
          display: "flex",
          flexDirection: "column",
        }}
        className="mx-auto mt-2 p-5 text-[#18414D] backdrop-blur-xl"
      >
        <div style={{ flex: "0 0 auto", position: "relative" }} className="mb-3">
          <input
            ref={titleRef}
            value={title}
            onChange={(e) => setTitle(e.target.value)}
            className="w-full bg-transparent text-center text-[28px] font-bold text-[#18414D] focus:outline-none"
          />
          {!title && (
            <span
              className="pointer-events-none absolute inset-0 flex items-center justify-center text-[28px] font-bold text-white/55"
              aria-hidden="true"
            >
              <span className="cursor-blink mr-1 inline-block h-[26px] w-[2px] bg-white/55" />
              アイディア
            </span>
          )}
        </div>
        <div style={{ flex: "1 1 auto", position: "relative", minHeight: 0 }}>
          <textarea
            ref={bodyRef}
            value={body}
            onChange={(e) => setBody(e.target.value)}
            style={{ width: "100%", height: "100%", overflowY: "auto", paddingRight: 10 }}
            className="icy-scroll resize-none bg-transparent text-[14.5px] leading-relaxed text-[#18414D] focus:outline-none"
          />
          {!body && (
            <span
              className="pointer-events-none absolute left-0 top-0 flex items-center text-[14.5px] leading-relaxed text-white/55"
              aria-hidden="true"
            >
              <span className="cursor-blink mr-0.5 inline-block h-[16px] w-[1.5px] bg-white/55" />
              詳細
            </span>
          )}
        </div>
      </div>
      <div style={{ height: "calc(env(safe-area-inset-bottom, 0px) + 24px)" }} />
    </div>
  );
}

function SearchScreen({ ideas, onBack, onOpenIdea }) {
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);

  useEffect(() => {
    inputRef.current?.focus();
  }, []);

  const results = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (q.length < 2) return [];
    return ideas.filter((i) => i.title.toLowerCase().includes(q) || i.body.toLowerCase().includes(q));
  }, [query, ideas]);

  return (
    <div className="relative flex min-h-screen w-full flex-col">
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 10,
          paddingLeft: 16,
          paddingRight: 16,
          paddingBottom: 12,
          paddingTop: "calc(env(safe-area-inset-top, 0px) + 12px)",
        }}
      >
        <GlassIconButton onClick={onBack} label="戻る">
          <ChevronLeft size={20} />
        </GlassIconButton>
        <div
          style={{
            flex: "1 1 auto",
            minWidth: 0,
            maxWidth: 347,
            height: 84,
            borderRadius: 24,
            backgroundColor: "rgba(255,255,255,0.10)",
            border: "1px solid rgba(255,255,255,0.40)",
            boxShadow: "inset 2px 1px 6px 0 rgba(255,255,255,0.4)",
          }}
          className="flex items-center gap-2 px-5 text-[#19414C] backdrop-blur-xl"
          onClick={(e) => {
            e.stopPropagation();
            inputRef.current?.focus();
          }}
        >
          <Search size={17} className="shrink-0 text-[#19414C]/70" />
          <input
            ref={inputRef}
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="アイディアを検索"
            className="search-ph w-full bg-transparent text-[16px] focus:outline-none"
          />
          {query && (
            <button onClick={() => setQuery("")} aria-label="クリア">
              <X size={15} className="text-[#19414C]/70" />
            </button>
          )}
        </div>
      </div>

      <div className="flex-1 px-4 pb-10">
        {query.trim().length < 2 ? (
          <p className="mt-10 text-center text-[14.5px] text-[#19414C]/60">タイトルや本文のキーワードで探せます</p>
        ) : results.length === 0 ? (
          <p className="mt-10 text-center text-[14.5px] text-[#19414C]/60">見つかりませんでした</p>
        ) : (
          <div
            style={{ display: "grid", gridTemplateColumns: "155px 155px", justifyContent: "center", columnGap: 24, rowGap: 20 }}
            className="pt-1"
          >
            {results.map((idea) => (
              <IdeaGlassCard key={idea.id} idea={idea} onOpen={() => onOpenIdea(idea.id)} />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------- app shell ----------------

function IdeaAppPrototype() {
  const persisted = useMemo(() => loadPersisted(), []);
  const [ideas, setIdeas] = useState(persisted?.ideas ?? seedIdeas);
  const [projectName, setProjectName] = useState(persisted?.projectName ?? "プロジェクト");
  const [draftIdea, setDraftIdea] = useState(null);
  const [view, setView] = useState("list"); // list | detail | edit | search
  const [activeId, setActiveId] = useState(null);

  // persist ideas + project name to localStorage whenever they change
  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ideas, projectName }));
    } catch (e) {
      // storage unavailable (private mode, quota, etc.) — fail silently
    }
  }, [ideas, projectName]);

  const isDraftActive = draftIdea && draftIdea.id === activeId;
  const activeIdea = isDraftActive ? draftIdea : ideas.find((i) => i.id === activeId) ?? null;

  function openIdea(id) {
    setActiveId(id);
    setView("detail");
  }
  function saveIdea(updated) {
    setIdeas((prev) => {
      const exists = prev.some((i) => i.id === updated.id);
      if (exists) return prev.map((i) => (i.id === updated.id ? { ...updated, updatedAt: "たった今" } : i));
      return [{ ...updated, updatedAt: "たった今" }, ...prev];
    });
    setDraftIdea(null);
    setView("list");
  }
  function newIdea() {
    const id = "draft-" + Date.now();
    const draft = { id, title: "", body: "", updatedAt: "たった今" };
    setDraftIdea(draft);
    setActiveId(id);
    setView("edit");
  }
  function discardDraft() {
    setDraftIdea(null);
    setActiveId(null);
    setView("list");
  }
  function deleteIdea(id) {
    setIdeas((prev) => prev.filter((i) => i.id !== id));
    setDraftIdea(null);
    setView("list");
  }

  return (
    <div className="bg-animated relative min-h-screen w-full">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { font-family: 'Zen Maru Gothic','Noto Sans JP',sans-serif; }
        .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .line-clamp-4 { display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
        .line-clamp-5 { display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden; }
        @keyframes bgShift {
          0%,100% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
        }
        @keyframes drift {
          0% { transform: translate(0,0) rotate(0deg); }
          50% { transform: translate(14px,-18px) rotate(8deg); }
          100% { transform: translate(0,0) rotate(0deg); }
        }
        .bg-animated {
          background: linear-gradient(120deg,#2E86E0,#45A5FA,#3B93EE,#6DBBFF);
          background-size: 300% 300%;
          animation: bgShift 14s ease-in-out infinite;
        }
        .orb { animation: drift 9s ease-in-out infinite; }
        .screen-enter { animation: screenIn .32s cubic-bezier(.22,1,.36,1); }
        @keyframes screenIn {
          from { opacity:0; transform: scale(.97) translateY(10px); }
          to { opacity:1; transform: scale(1) translateY(0); }
        }
        @keyframes blink { 0%,45% { opacity:1; } 46%,100% { opacity:0; } }
        .cursor-blink { animation: blink 1s step-end infinite; }
        .icy-scroll::-webkit-scrollbar { width: 5px; }
        .icy-scroll::-webkit-scrollbar-track { background: transparent; }
        .icy-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.45); border-radius: 999px; }
        .icy-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.45) transparent; }
        .search-ph::placeholder { color: #D9F3FF; opacity: 1; }
      `}</style>

      {/* ambient decoration */}
      <div className="orb pointer-events-none absolute left-[8%] top-[15%] h-40 w-40 rounded-full bg-white/10 blur-3xl" />
      <div className="orb pointer-events-none absolute bottom-[12%] right-[10%] h-56 w-56 rounded-full bg-white/10 blur-3xl" style={{ animationDelay: "-4s" }} />

      <div
        className="relative z-10"
        key={view}
        onClick={(e) => {
          const target = e.target;
          if (target.closest && target.closest("input, textarea, button")) return;
          if (document.activeElement && document.activeElement !== document.body) {
            document.activeElement.blur();
          }
        }}
      >
        <div className="screen-enter">
          {view === "list" && (
            <ListScreen
              ideas={ideas}
              projectName={projectName}
              onProjectNameChange={setProjectName}
              onOpenIdea={openIdea}
              onNewIdea={newIdea}
              onGoSearch={() => setView("search")}
            />
          )}
          {view === "detail" && activeIdea && (
            <DetailScreen
              idea={activeIdea}
              onBack={() => (isDraftActive ? discardDraft() : setView("list"))}
              onEdit={() => setView("edit")}
              onDelete={() => deleteIdea(activeIdea.id)}
            />
          )}
          {view === "edit" && activeIdea && (
            <EditScreen
              idea={activeIdea}
              isNew={isDraftActive}
              onCancel={() => (isDraftActive ? discardDraft() : setView("detail"))}
              onSave={saveIdea}
            />
          )}
          {view === "search" && <SearchScreen ideas={ideas} onBack={() => setView("list")} onOpenIdea={openIdea} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<IdeaAppPrototype />);
</script>
</body>
</html>
